<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夯HANG - 中国地图自定义标注</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214; color: #fff;
            overflow: hidden; user-select: none;
        }
        #map-container { width: 100vw; height: 100vh; z-index: 1; }
        
        #watermark {
            position: absolute; bottom: 30px; left: 40px;
            font-size: 100px; font-weight: 900; text-decoration: none;
            color: rgba(255, 255, 255, 0.05); z-index: 100;
            transition: 0.3s;
        }
        #watermark:hover { color: rgba(255, 255, 255, 0.1); transform: scale(1.02); }

        #config-panel {
            position: absolute; top: 30px; left: 30px; z-index: 100;
            background: rgba(30, 30, 32, 0.85); border: 1px solid #333336; 
            border-radius: 8px; padding: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); 
            width: 250px; backdrop-filter: blur(8px);
        }

        #tier-list { display: flex; flex-direction: column; gap: 10px; }
        .tier-row {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.03); padding: 5px; border-radius: 5px;
            transition: opacity 0.2s;
        }
        .tier-row.dragging { opacity: 0.4; border: 1px dashed #666; }
        
        .key-hint {
            display: flex; justify-content: center; align-items: center;
            width: 28px; height: 28px; background: #333336; 
            border-radius: 6px; font-size: 15px; color: #aaa; font-weight: 700;
            cursor: grab; flex-shrink: 0;
        }
        .key-hint:active { cursor: grabbing; background: #444; }
        
        .color-dot {
            width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
            transition: transform 0.1s; flex-shrink: 0; 
            border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box;
        }
        .color-dot:hover { transform: scale(1.1); border-color: #fff; }
        
        .tier-input {
            flex: 1; min-width: 50px; background: transparent; border: none; 
            border-bottom: 1px solid #333336; color: #fff; 
            font-size: 16px; font-weight: 600; outline: none; padding: 4px 0;
            transition: border-color 0.2s;
        }
        .tier-input:focus { border-bottom-color: #888; }
        
        .btn-del {
            background: transparent; border: none; color: #444; cursor: pointer;
            font-size: 18px; padding: 0 4px; opacity: 0; transition: 0.2s; flex-shrink: 0;
        }
        .tier-row:hover .btn-del { opacity: 1; }
        .btn-del:hover { color: #ff4d4f; }

        .add-tier-row {
            display: flex; justify-content: center; align-items: center;
            padding: 4px; border: 1px dashed #333336; border-radius: 5px;
            color: #555; cursor: pointer; font-size: 20px; font-weight: 300;
            transition: 0.2s; margin-top: 2px;
        }
        .add-tier-row:hover { border-color: #666; color: #aaa; background: rgba(255,255,255,0.02); }

        .panel-bottom-bar {
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed #333336;
            display: flex; gap: 10px; align-items: center; justify-content: space-between;
        }
        .export-btn { 
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #1a4a38; border: 1px solid #237804; color: #4ade80; 
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700;
            transition: 0.2s; outline: none; letter-spacing: 1px;
        }
        .export-btn:hover { background: #237804; color: #fff; }
        
        .gear-btn {
            background: #2c2c2e; border: 1px solid #333336; color: #aaa; cursor: pointer;
            width: 38px; height: 38px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; outline: none; flex-shrink: 0;
        }
        .gear-btn:hover { background: #333339; color: #fff; transform: rotate(90deg); }
        .gear-btn svg { width: 18px; height: 18px; fill: currentColor; }

        #settings-menu {
            display: none; position: absolute; bottom: 15px; left: 290px; z-index: 200;
            background: #1e1e20; border: 1px solid #333; padding: 10px;
            border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.8); width: 150px;
        }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .setting-label { font-size: 12px; color: #ccc; font-weight: 600; }
        .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333336; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: #aaa; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #237804; }
        input:checked + .slider:before { transform: translateX(14px); background-color: #fff; }
        
        .setting-btn {
            width: 100%; background: transparent; border: 1px solid #333; color: #aaa; 
            padding: 6px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;
            text-align: left; margin-bottom: 5px; transition: 0.2s;
        }
        .setting-btn:hover { background: #333336; color: #fff; border-color: #555; }
        .setting-btn.danger:hover { background: #5a1e1e; color: #ff4d4f; border-color: #ff4d4f; }

        #color-popover {
            display: none; position: absolute; z-index: 200;
            background: #1e1e20; border: 1px solid #333; padding: 8px;
            border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            grid-template-columns: repeat(8, 1fr); gap: 6px;
        }
        .swatch { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; }
        .swatch:hover { transform: scale(1.15); box-shadow: 0 0 0 1px #fff; }

        #rating-modal {
            display: none; position: absolute; z-index: 1000;
            background: rgba(30, 30, 32, 0.95); border: 1px solid #333336; padding: 8px;
            border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.8); backdrop-filter: blur(8px);
        }
        .modal-btn-group { display: flex; flex-direction: column; gap: 4px; }
        .modal-btn {
            border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px;
            font-weight: 600; font-size: 13px; color: #fff; text-align: left;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6); transition: transform 0.1s;
        }
        .modal-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .modal-btn-clear { background: #2a2a2c; color: #888; margin-top: 4px; text-shadow: none; }
        .modal-btn-clear:hover { background: #ff4d4f; color: #fff; }

        body.exporting .no-export { display: none !important; }
        body.exporting #config-panel { box-shadow: none !important; border-color: transparent !important; background: transparent !important; backdrop-filter: none !important; padding: 0 !important; }
        body.exporting .tier-row { background: transparent !important; border: none !important; }
        body.exporting .tier-input { border: none !important; padding-right: 28px; } 
    </style>
</head>
<body>

    <a id="watermark" href="https://github.com/Shuikun0/HANG" target="_blank" title="访问 HANG GitHub 仓库">夯</a>
    
    <div id="color-popover"></div>

    <div id="config-panel">
        <div id="tier-list"></div>
        
        <div class="panel-bottom-bar no-export">
            <button class="export-btn" onclick="exportImage()">📸 一键导出图片</button>
            <button class="gear-btn" onclick="toggleSettings(event)">
                <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </button>
        </div>
        
        <div id="settings-menu" class="no-export">
            <div class="setting-row">
                <span class="setting-label">显示地图地名</span>
                <label class="switch">
                    <input type="checkbox" id="show-labels" onchange="saveData(); if(isMapLoaded) renderMap()">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="setting-btn danger" onclick="clearAnnotations()">🗑️ 清除全部标注</button>
            <button class="setting-btn" onclick="resetDefaults(false)">🔄 恢复默认配置</button>
        </div>
    </div>

    <div id="rating-modal" class="no-export">
        <div class="modal-btn-group" id="modal-btns"></div>
        <button class="modal-btn modal-btn-clear" onclick="rateProvince(currentProvince, null)">[ 0 ] 取消标记</button>
    </div>

    <div id="map-container"></div>

    <script>
        const chart = echarts.init(document.getElementById('map-container'));
        const popover = document.getElementById('color-popover');
        const modal = document.getElementById('rating-modal');
        const settingsMenu = document.getElementById('settings-menu');
        const showLabelsSwitch = document.getElementById('show-labels');
        
        let hoveredProvince = ''; 
        let currentProvince = ''; 
        let activeTierForColor = null;
        let isMapLoaded = false; 

        const PERFECT_CENTER = [100, 36]; 
        const PERFECT_ZOOM = 1.05;
        const uid = () => 'T' + Math.random().toString(36).substr(2, 5);

        const defaultTiersConfig = [
            { text: 'S', color: '#5CAAF6' }, { text: 'A+', color: '#67D35F' },
            { text: 'A', color: '#A9C92C' }, { text: 'B+', color: '#F2CA3A' },
            { text: 'B', color: '#E98831' }, { text: 'C', color: '#DE453C' }
        ];

        let tiers = [];
        let provinceScores = {};

        const palettes = [
            '#ff7875', '#ff9c6e', '#ffc53d', '#95de64', '#5cdbd3', '#69c0ff', '#b37feb', '#ff85c0', 
            '#f5222d', '#fa8c16', '#fadb14', '#52c41a', '#13c2c2', '#1890ff', '#722ed1', '#eb2f96', 
            '#a8071a', '#ad4e00', '#ad8b00', '#237804', '#006d75', '#0050b3', '#391085', '#9e1068'  
        ];

        const validProvinces = [
            '北京', '天津', '河北', '山西', '内蒙古', '辽宁', '吉林', '黑龙江', '上海', 
            '江苏', '浙江', '安徽', '福建', '江西', '山东', '河南', '湖北', '湖南', 
            '广东', '广西', '海南', '重庆', '四川', '贵州', '云南', '西藏', '陕西', 
            '甘肃', '青海', '宁夏', '新疆', '台湾', '香港', '澳门'
        ];

        // --- 本地存储核心逻辑 ---
        function saveData() {
            localStorage.setItem('hang_tiers', JSON.stringify(tiers));
            localStorage.setItem('hang_scores', JSON.stringify(provinceScores));
            localStorage.setItem('hang_showLabels', showLabelsSwitch.checked);
        }

        function loadData() {
            const savedTiers = localStorage.getItem('hang_tiers');
            const savedScores = localStorage.getItem('hang_scores');
            const savedShowLabels = localStorage.getItem('hang_showLabels');

            if (savedTiers) {
                try { tiers = JSON.parse(savedTiers); } catch(e) { tiers = null; }
            }
            if (!tiers || tiers.length === 0) {
                tiers = defaultTiersConfig.map(t => ({ id: uid(), text: t.text, color: t.color }));
            }

            if (savedScores) {
                try { provinceScores = JSON.parse(savedScores); } catch(e) { provinceScores = {}; }
            } else {
                provinceScores = {};
            }

            if (savedShowLabels !== null) {
                showLabelsSwitch.checked = (savedShowLabels === 'true');
            }
        }
        // -----------------------

        function resetDefaults(skipRender = true) {
            tiers = defaultTiersConfig.map(t => ({ id: uid(), text: t.text, color: t.color }));
            provinceScores = {};
            settingsMenu.style.display = 'none';
            saveData(); // 保存重置状态
            renderTiersUI(); 
            if (isMapLoaded && !skipRender) renderMap();
        }

        function clearAnnotations() {
            provinceScores = {};
            settingsMenu.style.display = 'none';
            saveData(); // 保存清理状态
            if(isMapLoaded) renderMap();
        }

        function toggleSettings(e) {
            e.stopPropagation();
            settingsMenu.style.display = settingsMenu.style.display === 'block' ? 'none' : 'block';
            popover.style.display = 'none';
        }

        function updateText(id, val) {
            const t = tiers.find(x => x.id === id);
            if (t) t.text = val;
            saveData(); // 保存文本修改
            if(isMapLoaded) renderMap();
        }

        function addTier() {
            if (tiers.length >= 9) return;
            const randomColor = palettes[8 + Math.floor(Math.random() * 8)];
            tiers.push({ id: uid(), text: '', color: randomColor });
            saveData(); // 保存新增档位
            renderTiersUI(); 
            if(isMapLoaded) renderMap();
        }

        function deleteTier(id) {
            tiers = tiers.filter(t => t.id !== id);
            for(let p in provinceScores) {
                if(provinceScores[p] === id) delete provinceScores[p];
            }
            saveData(); // 保存删除状态
            renderTiersUI(); 
            if(isMapLoaded) renderMap();
        }

        function openColorPicker(e, id) {
            e.stopPropagation();
            activeTierForColor = id;
            popover.style.display = 'grid';
            popover.style.left = (e.clientX + 20) + 'px';
            popover.style.top = (e.clientY - 10) + 'px';
            settingsMenu.style.display = 'none';
        }

        function initPopover() {
            popover.style.display = 'grid';
            palettes.forEach(color => {
                const div = document.createElement('div');
                div.className = 'swatch';
                div.style.backgroundColor = color;
                div.onclick = (e) => {
                    e.stopPropagation();
                    if (activeTierForColor) {
                        const t = tiers.find(x => x.id === activeTierForColor);
                        if (t) t.color = color;
                        popover.style.display = 'none';
                        saveData(); // 保存颜色修改
                        renderTiersUI();
                        if(isMapLoaded) renderMap();
                    }
                };
                popover.appendChild(div);
            });
            popover.style.display = 'none';
        }

        function renderTiersUI() {
            const list = document.getElementById('tier-list');
            list.innerHTML = ''; 

            tiers.forEach((tier, index) => {
                const key = index + 1;
                const row = document.createElement('div');
                row.className = 'tier-row';
                row.draggable = true;
                
                row.innerHTML = `
                    <div class="key-hint no-export">${key}</div>
                    <div class="color-dot" style="background-color:${tier.color}" onclick="openColorPicker(event, '${tier.id}')"></div>
                    <input type="text" class="tier-input" value="${tier.text}" oninput="updateText('${tier.id}', this.value)">
                    <button class="btn-del no-export" onclick="deleteTier('${tier.id}')">×</button>
                `;

                row.addEventListener('dragstart', e => {
                    row.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', index);
                });
                row.addEventListener('dragend', () => row.classList.remove('dragging'));
                row.addEventListener('dragover', e => e.preventDefault());
                row.addEventListener('drop', e => {
                    e.preventDefault();
                    const fromIndex = e.dataTransfer.getData('text/plain');
                    if (fromIndex === index.toString()) return;
                    const item = tiers.splice(fromIndex, 1)[0];
                    tiers.splice(index, 0, item);
                    saveData(); // 保存拖拽排序
                    renderTiersUI(); 
                    if(isMapLoaded) renderMap();
                });

                list.appendChild(row);
            });

            if (tiers.length < 9) {
                const addRow = document.createElement('div');
                addRow.className = 'add-tier-row no-export';
                addRow.innerHTML = '+';
                addRow.onclick = addTier; 
                list.appendChild(addRow);
            }
        }

        function getScatterStyle(provinceName) {
            const tierId = provinceScores[provinceName];
            const t = tiers.find(t => t.id === tierId);
            return {
                color: t ? t.color : '#1c1c1e',      
                borderColor: '#2c2c2e', 
                borderWidth: 1.5,       
                opacity: 1              
            };
        }

        function renderMap() {
            if (!isMapLoaded) return; 
            const showLabels = showLabelsSwitch.checked;
            
            const tinyProvinces = ['北京', '天津', '上海', '香港', '澳门'];
            const tinyLinesData = [
                { coords: [[116.405, 39.904], [119.5, 40.8]] }, 
                { coords: [[117.190, 39.125], [119.5, 38.5]] }, 
                { coords: [[121.473, 31.230], [124.0, 31.230]] }, 
                { coords: [[114.173, 22.320], [116.5, 21.5]] }, 
                { coords: [[113.549, 22.198], [115.0, 20.5]] }  
            ];
            const tinyLabelsData = [
                { name: '北京', value: [119.5, 40.8], label: { position: 'right' } },
                { name: '天津', value: [119.5, 38.5], label: { position: 'right' } },
                { name: '上海', value: [124.0, 31.230], label: { position: 'right' } },
                { name: '香港', value: [116.5, 21.5], label: { position: 'right' } },
                { name: '澳门', value: [115.0, 20.5], label: { position: 'right' } } 
            ];

            const regionsData = Object.keys(provinceScores).map(name => {
                const tierId = provinceScores[name];
                const tierConfig = tiers.find(t => t.id === tierId);
                if (tierConfig) {
                    return {
                        name: name,
                        itemStyle: { areaColor: tierConfig.color },
                        emphasis: { itemStyle: { areaColor: tierConfig.color } }
                    };
                }
                return null;
            }).filter(Boolean);

            const hoverLabelFormatter = function(params) {
                const tierId = provinceScores[params.name];
                if (tierId) {
                    const tier = tiers.find(t => t.id === tierId);
                    if (tier && tier.text.trim() !== '') {
                        return `${params.name}\n[ ${tier.text} ]`;
                    }
                }
                return params.name;
            };

            const seriesArray = [
                {
                    type: 'scatter', coordinateSystem: 'geo', symbol: 'circle', symbolSize: 13, 
                    data: [
                        { name: '香港', value: [114.173355, 22.320048], itemStyle: getScatterStyle('香港') },
                        { name: '澳门', value: [113.54909, 22.198951], itemStyle: getScatterStyle('澳门') }
                    ],
                    emphasis: {
                        itemStyle: { borderColor: '#fff', borderWidth: 2 },
                        label: {
                            show: true, color: '#ffffff',
                            fontSize: 13, fontWeight: 'bold',
                            textBorderColor: 'rgba(0,0,0,0.8)', textBorderWidth: 2,
                            formatter: hoverLabelFormatter
                        }
                    }
                }
            ];

            if (showLabels) {
                seriesArray.push({
                    type: 'lines', coordinateSystem: 'geo', zlevel: 2, silent: true,
                    lineStyle: { color: '#666', width: 1, type: 'dashed', opacity: 0.8 },
                    data: tinyLinesData
                });
                seriesArray.push({
                    type: 'scatter', coordinateSystem: 'geo', zlevel: 2, silent: true,
                    symbol: 'circle', symbolSize: 3, itemStyle: { color: '#666' },
                    label: { 
                        show: true, color: '#e0e0e0', fontSize: 11, formatter: '{b}',
                        textBorderColor: 'rgba(0,0,0,0.8)', textBorderWidth: 2 
                    },
                    data: tinyLabelsData
                });
            }

            const option = {
                backgroundColor: '#121214', animation: false, tooltip: { show: false },
                geo: {
                    map: 'custom_china', roam: true, scaleLimit: { min: 1, max: 6 },
                    center: PERFECT_CENTER, zoom: PERFECT_ZOOM, selectedMode: false, 
                    label: { 
                        show: showLabels, color: '#e0e0e0', fontSize: 11,
                        textBorderColor: 'rgba(0,0,0,0.8)', textBorderWidth: 2, 
                        formatter: function(params) {
                            if (tinyProvinces.includes(params.name)) return '';
                            return params.name;
                        }
                    },
                    itemStyle: { areaColor: '#1c1c1e', borderColor: '#2c2c2e', borderWidth: 1 },
                    emphasis: {
                        itemStyle: { areaColor: '#28282b' },
                        label: {
                            show: true, color: '#ffffff',
                            fontSize: 13, fontWeight: 'bold', 
                            textBorderColor: 'rgba(0,0,0,0.8)', textBorderWidth: 2,
                            formatter: hoverLabelFormatter
                        }
                    },
                    regions: regionsData 
                },
                series: seriesArray
            };
            chart.setOption(option, true); 
        }

        function rateProvince(provinceName, tierId) {
            if (!provinceName) return;
            if (tierId) provinceScores[provinceName] = tierId;
            else delete provinceScores[provinceName];
            
            modal.style.display = 'none';
            saveData(); // 保存打分状态
            if(isMapLoaded) renderMap(); 
        }

        function showRatingModal(x, y) {
            const modalBtns = document.getElementById('modal-btns');
            modalBtns.innerHTML = ''; 
            
            tiers.forEach((tier, index) => {
                const key = index + 1;
                const mBtn = document.createElement('button');
                mBtn.className = 'modal-btn';
                mBtn.style.backgroundColor = tier.color;
                mBtn.innerText = `[ ${key} ] ${tier.text || '未命名'}`;
                mBtn.onclick = () => rateProvince(currentProvince, tier.id);
                modalBtns.appendChild(mBtn);
            });
            
            modal.style.display = 'block';
            modal.style.left = x + 'px';
            modal.style.top = y + 'px';
        }

        function exportImage() {
            popover.style.display = 'none';
            modal.style.display = 'none';
            settingsMenu.style.display = 'none';
            document.body.classList.add('exporting');

            chart.setOption({
                geo: { center: PERFECT_CENTER, zoom: PERFECT_ZOOM }
            });
            
            setTimeout(() => {
                html2canvas(document.body, { 
                    backgroundColor: '#121214', scale: 2 
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = '夯HANG_中国地图标注.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    document.body.classList.remove('exporting');
                });
            }, 500); 
        }

        chart.on('click', function(params) {
            if (!params.name) return; 
            currentProvince = params.name;
            const event = params.event.event;
            showRatingModal(event.clientX + 15, event.clientY + 15);
        });

        chart.getZr().on('click', function(event) {
            if (!event.target) modal.style.display = 'none';
        });

        chart.on('georoam', function() { modal.style.display = 'none'; });
        chart.on('mouseover', function(params) { hoveredProvince = params.name; });
        chart.on('mouseout', function() { hoveredProvince = ''; });

        window.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (!hoveredProvince) return;

            if (e.key === '0') {
                rateProvince(hoveredProvince, null);
            } else {
                const index = parseInt(e.key) - 1;
                if (index >= 0 && index < tiers.length) {
                    rateProvince(hoveredProvince, tiers[index].id);
                }
            }
        });

        window.addEventListener('resize', () => chart.resize());

        document.addEventListener('click', (e) => {
            if (!popover.contains(e.target) && !e.target.classList.contains('color-dot')) {
                popover.style.display = 'none';
            }
            if (!settingsMenu.contains(e.target) && !e.target.closest('.gear-btn')) {
                settingsMenu.style.display = 'none';
            }
        });

        // 启动逻辑：先读缓存，再渲染 UI
        initPopover();
        loadData();
        renderTiersUI(); 

        fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(response => response.json())
            .then(geoJson => {
                geoJson.features = geoJson.features.filter(feature => {
                    let name = feature.properties.name;
                    if (!name) return false;
                    name = name.replace(/(维吾尔|壮族|回族)?自治区|特别行政区|省|市/g, '');
                    feature.properties.name = name;
                    
                    if (name === '甘肃') feature.properties.cp = [103.82, 36.06]; 
                    if (name === '河北') feature.properties.cp = [115.48, 38.85]; 
                    
                    if (name === '海南' && feature.geometry.type === 'MultiPolygon') {
                        let mainIsland = feature.geometry.coordinates[0];
                        let maxPoints = 0;
                        feature.geometry.coordinates.forEach(poly => {
                            if (poly[0].length > maxPoints) {
                                maxPoints = poly[0].length;
                                mainIsland = poly;
                            }
                        });
                        feature.geometry.coordinates = [mainIsland];
                    }
                    return validProvinces.includes(name);
                });

                echarts.registerMap('custom_china', geoJson);
                isMapLoaded = true; 
                renderMap();        
            });

    </script>
</body>
</html>
